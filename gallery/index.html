<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>summon — Workspace Layout Gallery</title>
  <meta name="description" content="One command to summon your entire Ghostty dev environment. Browse 10 workspace layouts.">
  <meta property="og:title" content="summon — Workspace Layout Gallery">
  <meta property="og:description" content="One command to summon your entire Ghostty dev environment. Browse 10 workspace layouts.">
  <meta property="og:image" content="https://juan294.github.io/summon/images/og-image.png">
  <meta property="og:url" content="https://juan294.github.io/summon/gallery/">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #0C0D14;
      --bg-card: #13141D;
      --bg-card-hover: #1A1B26;
      --text-primary: #E2E4E9;
      --text-secondary: #8B8FA3;
      --accent-magenta: #D946EF;
      --accent-cyan: #06B6D4;
      --border: #2A2B36;
      --font-mono: 'JetBrains Mono', monospace;
      --radius: 12px;
      --max-width: 1200px;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: var(--font-mono);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ── Hero ─────────────────────────────────────── */

    .hero {
      text-align: center;
      padding: 60px 24px 48px;
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      top: -80px;
      left: 50%;
      transform: translateX(-50%);
      width: 500px;
      height: 350px;
      background: radial-gradient(ellipse, rgba(217, 70, 239, 0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-logo {
      width: 120px;
      height: 120px;
      margin: 0 auto 8px;
      display: block;
      border-radius: 20px;
    }

    .hero-tagline {
      font-size: clamp(1rem, 2.5vw, 1.25rem);
      color: var(--text-primary);
      margin-top: 8px;
      font-weight: 400;
    }

    .hero-install {
      margin-top: 24px;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 20px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
    }

    .hero-install:hover {
      border-color: var(--accent-cyan);
      background: var(--bg-card-hover);
    }

    .hero-install code {
      font-family: var(--font-mono);
      font-size: 0.95rem;
      color: var(--accent-cyan);
    }

    .copy-icon {
      width: 18px;
      height: 18px;
      color: var(--text-secondary);
      transition: color 0.2s;
      flex-shrink: 0;
    }

    .hero-install:hover .copy-icon { color: var(--accent-cyan); }

    .copy-feedback {
      position: absolute;
      top: -32px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--accent-cyan);
      color: var(--bg-primary);
      font-size: 0.75rem;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 4px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s, top 0.2s;
    }

    .copy-feedback.show {
      opacity: 1;
      top: -36px;
    }

    .hero-subtitle {
      margin-top: 16px;
      font-size: 0.82rem;
      color: var(--text-secondary);
      max-width: 420px;
      margin-left: auto;
      margin-right: auto;
    }

    /* ── Gallery Grid ────────────────────────────── */

    .gallery {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 0 24px 80px;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 24px;
    }

    /* ── Card ─────────────────────────────────────── */

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: background 0.25s, border-color 0.25s, transform 0.25s;
      cursor: pointer;
    }

    .card:hover {
      background: var(--bg-card-hover);
      border-color: rgba(6, 182, 212, 0.3);
      transform: translateY(-2px);
    }

    .card-image-wrap {
      position: relative;
      aspect-ratio: 16 / 9;
      overflow: hidden;
      background: var(--bg-primary);
    }

    .card-image-wrap picture {
      display: block;
      width: 100%;
      height: 100%;
    }

    .card-image-wrap img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.3s;
    }

    .card:hover .card-image-wrap img {
      transform: scale(1.03);
    }

    .card-expand-hint {
      position: absolute;
      bottom: 10px;
      right: 10px;
      background: rgba(12, 13, 20, 0.7);
      border: 1px solid rgba(226, 228, 233, 0.15);
      color: var(--text-primary);
      font-size: 0.65rem;
      padding: 4px 10px;
      border-radius: 4px;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .card:hover .card-expand-hint {
      opacity: 1;
    }

    .card-expand-hint svg {
      width: 12px;
      height: 12px;
    }

    .card-body {
      padding: 20px;
    }

    .card-title {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--accent-cyan);
      margin-bottom: 6px;
    }

    .card-desc {
      font-size: 0.82rem;
      color: var(--text-secondary);
      line-height: 1.5;
      margin-bottom: 12px;
    }

    .card-tools {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .card-tools span {
      font-size: 0.7rem;
      color: var(--text-secondary);
      background: rgba(139, 143, 163, 0.08);
      border: 1px solid rgba(139, 143, 163, 0.12);
      border-radius: 4px;
      padding: 3px 8px;
      font-family: var(--font-mono);
    }

    /* ── Lightbox ─────────────────────────────────── */

    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(6, 7, 10, 0.92);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .lightbox.open {
      display: flex;
    }

    .lightbox-header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 16px 24px;
      width: 100%;
      max-width: 1100px;
    }

    .lightbox-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--accent-cyan);
    }

    .lightbox-toggle {
      display: flex;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
    }

    .lightbox-toggle button {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      font-weight: 700;
      padding: 6px 16px;
      border: none;
      cursor: pointer;
      color: var(--text-secondary);
      background: transparent;
      transition: background 0.15s, color 0.15s;
    }

    .lightbox-toggle button.active {
      background: var(--accent-cyan);
      color: var(--bg-primary);
    }

    .lightbox-toggle button:not(.active):hover {
      background: var(--bg-card-hover);
      color: var(--text-primary);
    }

    .lightbox-close {
      position: absolute;
      top: 16px;
      right: 20px;
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-secondary);
      cursor: pointer;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s, border-color 0.2s;
      font-family: var(--font-mono);
      font-size: 1.2rem;
    }

    .lightbox-close:hover {
      color: var(--text-primary);
      border-color: var(--text-secondary);
    }

    .lightbox-image-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      max-width: 1100px;
      padding: 0 24px 16px;
      min-height: 0;
    }

    .lightbox-image-wrap picture {
      display: block;
      max-width: 100%;
      max-height: 100%;
    }

    .lightbox-image-wrap img {
      display: block;
      max-width: 100%;
      max-height: calc(100vh - 140px);
      object-fit: contain;
      border-radius: 8px;
      border: 1px solid var(--border);
    }

    .lightbox-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(19, 20, 29, 0.8);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      cursor: pointer;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      transition: color 0.2s, border-color 0.2s, background 0.2s;
    }

    .lightbox-nav:hover {
      color: var(--text-primary);
      border-color: var(--accent-cyan);
      background: rgba(19, 20, 29, 0.95);
    }

    .lightbox-nav svg {
      width: 20px;
      height: 20px;
    }

    .lightbox-prev { left: 16px; }
    .lightbox-next { right: 16px; }

    .lightbox-desc {
      text-align: center;
      padding: 0 24px 20px;
      font-size: 0.78rem;
      color: var(--text-secondary);
      max-width: 600px;
    }

    /* ── CTA Section ─────────────────────────────── */

    .cta {
      text-align: center;
      padding: 64px 24px 48px;
      border-top: 1px solid var(--border);
      max-width: var(--max-width);
      margin: 0 auto;
    }

    .cta-install {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 24px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
    }

    .cta-install:hover {
      border-color: var(--accent-cyan);
      background: var(--bg-card-hover);
    }

    .cta-install code {
      font-family: var(--font-mono);
      font-size: 1rem;
      color: var(--accent-cyan);
    }

    .cta-install:hover .copy-icon { color: var(--accent-cyan); }

    .cta-requirements {
      margin-top: 20px;
      font-size: 0.78rem;
      color: var(--text-secondary);
    }

    .cta-links {
      margin-top: 24px;
      display: flex;
      justify-content: center;
      gap: 24px;
    }

    .cta-links a {
      font-size: 0.85rem;
      color: var(--accent-cyan);
      text-decoration: none;
      transition: color 0.2s;
    }

    .cta-links a:hover { color: var(--accent-magenta); }

    /* ── Footer ───────────────────────────────────── */

    .footer {
      text-align: center;
      padding: 32px 24px;
      border-top: 1px solid var(--border);
      font-size: 0.75rem;
      color: var(--text-secondary);
    }

    .footer a {
      color: var(--text-secondary);
      text-decoration: none;
      transition: color 0.2s;
    }

    .footer a:hover { color: var(--accent-cyan); }

    .footer-sep {
      margin: 0 12px;
      opacity: 0.4;
    }

    /* ── Responsive ───────────────────────────────── */

    @media (max-width: 1024px) {
      .gallery-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 640px) {
      .hero { padding: 48px 16px 36px; }
      .hero-logo { width: 96px; height: 96px; }
      .gallery { padding: 0 16px 56px; }
      .gallery-grid { grid-template-columns: 1fr; }
      .lightbox-nav { display: none; }
      .lightbox-header { padding: 12px 16px; }
      .lightbox-image-wrap { padding: 0 12px 12px; }
    }
  </style>
</head>
<body>

  <!-- ── Hero ──────────────────────────────────────── -->
  <section class="hero">
    <img src="../images/logo.png" alt="summon logo" class="hero-logo">
    <p class="hero-tagline">One command. Your entire workspace.</p>
    <div class="hero-install" onclick="copyInstall(this)" role="button" tabindex="0" aria-label="Copy install command">
      <code>npm i -g summon-ws</code>
      <svg class="copy-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
      <span class="copy-feedback">Copied!</span>
    </div>
    <p class="hero-subtitle">Click any layout to view full-size. Toggle between minimal and full configurations.</p>
  </section>

  <!-- ── Gallery ───────────────────────────────────── -->
  <section class="gallery">
    <div class="gallery-grid" id="gallery-grid"></div>
  </section>

  <!-- ── Lightbox ──────────────────────────────────── -->
  <div class="lightbox" id="lightbox">
    <div class="lightbox-header">
      <span class="lightbox-title" id="lb-title"></span>
      <div class="lightbox-toggle">
        <button id="lb-btn-min" onclick="setLightboxMode('min')">Minimal</button>
        <button id="lb-btn-max" onclick="setLightboxMode('max')" class="active">Full</button>
      </div>
    </div>
    <div class="lightbox-image-wrap">
      <picture id="lb-picture">
        <source id="lb-source" srcset="" type="image/webp">
        <img id="lb-img" src="" alt="">
      </picture>
    </div>
    <p class="lightbox-desc" id="lb-desc"></p>
    <button class="lightbox-close" onclick="closeLightbox()" aria-label="Close">&times;</button>
    <button class="lightbox-nav lightbox-prev" onclick="navLightbox(-1)" aria-label="Previous">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <button class="lightbox-nav lightbox-next" onclick="navLightbox(1)" aria-label="Next">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 6 15 12 9 18"/></svg>
    </button>
  </div>

  <!-- ── CTA ───────────────────────────────────────── -->
  <section class="cta">
    <div class="cta-install" onclick="copyInstall(this)" role="button" tabindex="0" aria-label="Copy install command">
      <code>npm i -g summon-ws</code>
      <svg class="copy-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
      <span class="copy-feedback">Copied!</span>
    </div>
    <p class="cta-requirements">Requires Node &ge; 18 &middot; macOS &middot; Ghostty terminal</p>
    <div class="cta-links">
      <a href="https://github.com/juan294/summon" target="_blank" rel="noopener">GitHub</a>
      <a href="https://www.npmjs.com/package/summon-ws" target="_blank" rel="noopener">npm</a>
    </div>
  </section>

  <!-- ── Footer ────────────────────────────────────── -->
  <footer class="footer">
    <a href="https://github.com/juan294/summon" target="_blank" rel="noopener">GitHub</a>
    <span class="footer-sep">&middot;</span>
    <a href="https://www.npmjs.com/package/summon-ws" target="_blank" rel="noopener">npm</a>
    <span class="footer-sep">&middot;</span>
    <a href="https://github.com/juan294/summon#readme" target="_blank" rel="noopener">Docs</a>
  </footer>

  <script>
    /* ── Card Data ──────────────────────────────────── */
    var CARDS = [
      { id: 'fullstack', title: 'Fullstack', desc: 'Full-stack development with editor, shell, and git in one view.', tools: ['Claude', 'lazygit', 'btop', 'shell'] },
      { id: 'backend', title: 'Backend', desc: 'Server and API development with code review and monitoring.', tools: ['Claude', 'lazygit', 'btop', 'docs'] },
      { id: 'devops', title: 'DevOps', desc: 'Infrastructure, containers, and deployment with live monitoring.', tools: ['Vim', 'Docker', 'btop', 'logs'] },
      { id: 'data', title: 'Data', desc: 'Data science workspace with file browsing, REPL, and visualization.', tools: ['Claude', 'Python', 'yazi', 'btop'] },
      { id: 'systems', title: 'Systems', desc: 'Systems programming with performance metrics and deep monitoring.', tools: ['Editor', 'btop', 'lazygit', 'metrics'] },
      { id: 'frontend', title: 'Frontend', desc: 'Web UI development with test runner and live build output.', tools: ['Claude', 'npm', 'lazygit', 'btop'] },
      { id: 'network', title: 'Network', desc: 'Network monitoring with bandwidth charts and traffic analysis.', tools: ['bandwhich', 'btop', 'tcpdump', 'logs'] },
      { id: 'ml', title: 'ML', desc: 'Machine learning with training visualization and resource monitoring.', tools: ['Claude', 'training logs', 'btop', 'lazygit'] },
      { id: 'flex', title: 'Flex', desc: 'Creative multi-tool workspace \u2014 because your terminal can be fun too.', tools: ['cmatrix', 'btop', 'neofetch', 'Claude'] },
      { id: 'dual-editor', title: 'Dual Editor', desc: 'Side-by-side editors for pair programming or code review.', tools: ['Claude', 'Helix', 'btop', 'lazygit'] }
    ];

    /* ── Render Cards ──────────────────────────────── */
    var grid = document.getElementById('gallery-grid');

    CARDS.forEach(function(card, idx) {
      var el = document.createElement('article');
      el.className = 'card';
      el.setAttribute('data-index', idx);
      el.innerHTML =
        '<div class="card-image-wrap">' +
          '<picture>' +
            '<source srcset="../images/' + card.id + '-max.webp" type="image/webp">' +
            '<img src="../images/' + card.id + '-max.png" alt="' + card.title + ' workspace layout" loading="lazy">' +
          '</picture>' +
          '<span class="card-expand-hint">' +
            '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>' +
            'Click to expand' +
          '</span>' +
        '</div>' +
        '<div class="card-body">' +
          '<h2 class="card-title">' + card.title + '</h2>' +
          '<p class="card-desc">' + card.desc + '</p>' +
          '<div class="card-tools">' +
            card.tools.map(function(t) { return '<span>' + t + '</span>'; }).join('') +
          '</div>' +
        '</div>';
      el.addEventListener('click', function() { openLightbox(idx); });
      grid.appendChild(el);
    });

    /* ── Lightbox ──────────────────────────────────── */
    var lightbox = document.getElementById('lightbox');
    var lbTitle = document.getElementById('lb-title');
    var lbDesc = document.getElementById('lb-desc');
    var lbImg = document.getElementById('lb-img');
    var lbSource = document.getElementById('lb-source');
    var lbBtnMin = document.getElementById('lb-btn-min');
    var lbBtnMax = document.getElementById('lb-btn-max');
    var currentIndex = 0;
    var currentMode = 'max';

    function openLightbox(idx) {
      currentIndex = idx;
      currentMode = 'max';
      updateLightbox();
      lightbox.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      lightbox.classList.remove('open');
      document.body.style.overflow = '';
    }

    function navLightbox(dir) {
      currentIndex = (currentIndex + dir + CARDS.length) % CARDS.length;
      updateLightbox();
    }

    function setLightboxMode(mode) {
      currentMode = mode;
      updateLightbox();
    }

    function updateLightbox() {
      var card = CARDS[currentIndex];
      lbTitle.textContent = card.title;
      lbDesc.textContent = card.desc;
      lbSource.setAttribute('srcset', '../images/' + card.id + '-' + currentMode + '.webp');
      lbImg.src = '../images/' + card.id + '-' + currentMode + '.png';
      lbImg.alt = card.title + ' ' + currentMode + ' layout';
      lbBtnMin.className = currentMode === 'min' ? 'active' : '';
      lbBtnMax.className = currentMode === 'max' ? 'active' : '';
    }

    /* Close on backdrop click */
    lightbox.addEventListener('click', function(e) {
      if (e.target === lightbox) closeLightbox();
    });

    /* Keyboard navigation */
    document.addEventListener('keydown', function(e) {
      if (!lightbox.classList.contains('open')) return;
      if (e.key === 'Escape') closeLightbox();
      else if (e.key === 'ArrowLeft') navLightbox(-1);
      else if (e.key === 'ArrowRight') navLightbox(1);
      else if (e.key === 'm' || e.key === '1') setLightboxMode('min');
      else if (e.key === 'f' || e.key === '2') setLightboxMode('max');
    });

    /* ── Copy Install Command ──────────────────────── */
    function copyInstall(el) {
      var text = 'npm i -g summon-ws';
      var feedback = el.querySelector('.copy-feedback');

      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(function() {
          showFeedback(feedback);
        });
      } else {
        var ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.select();
        try { document.execCommand('copy'); } catch (_) {}
        document.body.removeChild(ta);
        showFeedback(feedback);
      }
    }

    function showFeedback(el) {
      el.classList.add('show');
      setTimeout(function() { el.classList.remove('show'); }, 1200);
    }

    document.querySelectorAll('.hero-install, .cta-install').forEach(function(btn) {
      btn.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          copyInstall(btn);
        }
      });
    });
  </script>
</body>
</html>
