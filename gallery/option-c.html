<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>summon — Workspace Layout Gallery</title>
  <meta name="description" content="One command to summon your entire Ghostty dev environment. Browse 10 workspace layouts.">
  <meta property="og:title" content="summon — Workspace Layout Gallery">
  <meta property="og:description" content="One command to summon your entire Ghostty dev environment. Browse 10 workspace layouts.">
  <meta property="og:image" content="https://juan294.github.io/summon/images/og-image.png">
  <meta property="og:url" content="https://juan294.github.io/summon/gallery/">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #0C0D14;
      --bg-card: #13141D;
      --bg-card-hover: #1A1B26;
      --text-primary: #E2E4E9;
      --text-secondary: #8B8FA3;
      --accent-magenta: #D946EF;
      --accent-cyan: #06B6D4;
      --border: #2A2B36;
      --font-mono: 'JetBrains Mono', monospace;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: var(--font-mono);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
    }

    /* ── Fixed Header ─────────────────────────────── */

    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 24px;
      background: rgba(12, 13, 20, 0.88);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-logo {
      width: 40px;
      height: 40px;
      border-radius: 8px;
    }

    .header-brand {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--accent-magenta);
      letter-spacing: -0.02em;
    }

    .header-tagline {
      font-size: 0.72rem;
      color: var(--text-secondary);
      margin-left: 12px;
      display: none;
    }

    @media (min-width: 640px) {
      .header-tagline {
        display: inline;
      }
    }

    .header-install {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 14px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-secondary);
      font-family: var(--font-mono);
      font-size: 0.75rem;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .header-install:hover {
      border-color: var(--accent-cyan);
      color: var(--text-primary);
    }

    .header-install-icon {
      width: 13px;
      height: 13px;
      opacity: 0.5;
    }

    /* ── Main Content ─────────────────────────────── */

    .main {
      padding-top: 60px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Spotlight Area ────────────────────────────── */

    .spotlight {
      position: relative;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px 20px;
      min-height: 0;
    }

    .spotlight-glow {
      position: absolute;
      width: 65%;
      height: 55%;
      top: 40%;
      left: 50%;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      pointer-events: none;
      filter: blur(50px);
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    .spotlight-glow.is-visible {
      opacity: 1;
    }

    .spotlight-glow.glow-magenta {
      background: radial-gradient(ellipse, rgba(217, 70, 239, 0.14) 0%, transparent 70%);
    }

    .spotlight-glow.glow-cyan {
      background: radial-gradient(ellipse, rgba(6, 182, 212, 0.14) 0%, transparent 70%);
    }

    /* ── Spotlight Image Container ────────────────── */

    .spotlight-stage {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      max-width: 75vw;
    }

    .spotlight-image-container {
      position: relative;
      cursor: pointer;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .spotlight-image-container picture {
      display: block;
      width: 100%;
    }

    .spotlight-img {
      display: block;
      max-width: 75vw;
      max-height: 58vh;
      width: auto;
      height: auto;
      border-radius: 8px;
      border: 1px solid var(--border);
      object-fit: contain;
      transition: opacity 0.3s ease;
    }

    .spotlight-img.is-fading {
      opacity: 0;
    }

    .spotlight-img.glow-shadow-magenta {
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.6), 0 0 100px rgba(217, 70, 239, 0.1);
    }

    .spotlight-img.glow-shadow-cyan {
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.6), 0 0 100px rgba(6, 182, 212, 0.1);
    }

    /* ── Arrow Buttons (flanking spotlight) ────────── */

    .spotlight-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 5;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: rgba(19, 20, 29, 0.9);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      color: var(--text-secondary);
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
    }

    .spotlight-arrow:hover {
      border-color: var(--accent-cyan);
      color: var(--text-primary);
      background: var(--bg-card-hover);
    }

    .spotlight-arrow-left {
      left: -60px;
    }

    .spotlight-arrow-right {
      right: -60px;
    }

    .spotlight-arrow svg {
      width: 18px;
      height: 18px;
    }

    /* ── Spotlight Info ────────────────────────────── */

    .spotlight-info {
      position: relative;
      z-index: 2;
      text-align: center;
      margin-top: 24px;
      max-width: 640px;
    }

    .spotlight-title-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }

    .spotlight-title {
      font-size: clamp(1.4rem, 3vw, 1.85rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      transition: color 0.3s ease;
    }

    .spotlight-title.color-magenta {
      color: var(--accent-magenta);
    }

    .spotlight-title.color-cyan {
      color: var(--accent-cyan);
    }

    .spotlight-mode-toggle {
      display: flex;
      gap: 4px;
    }

    .mode-btn {
      padding: 4px 12px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text-secondary);
      font-family: var(--font-mono);
      font-size: 0.7rem;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
    }

    .mode-btn:hover {
      border-color: var(--accent-cyan);
      color: var(--text-primary);
    }

    .mode-btn.is-active {
      border-color: var(--accent-magenta);
      color: var(--accent-magenta);
      background: rgba(217, 70, 239, 0.08);
    }

    .spotlight-desc {
      font-size: clamp(0.78rem, 1.5vw, 0.9rem);
      color: var(--text-secondary);
      margin-bottom: 12px;
      line-height: 1.5;
      transition: opacity 0.3s ease;
    }

    .spotlight-tools {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      transition: opacity 0.3s ease;
    }

    .tool-pill {
      padding: 4px 12px;
      font-size: 0.72rem;
      border-radius: 999px;
      border: 1px solid var(--border);
      color: var(--text-secondary);
      background: var(--bg-card);
      white-space: nowrap;
    }

    /* ── Layout Counter ───────────────────────────── */

    .spotlight-counter {
      margin-top: 14px;
      font-size: 0.7rem;
      color: var(--text-secondary);
      opacity: 0.6;
      letter-spacing: 0.05em;
    }

    .spotlight-counter .current {
      color: var(--accent-cyan);
      font-weight: 700;
    }

    /* ── Filmstrip ────────────────────────────────── */

    .filmstrip-section {
      position: relative;
      padding: 0 24px 24px;
      flex-shrink: 0;
    }

    .filmstrip-track-wrapper {
      position: relative;
      overflow: hidden;
    }

    .filmstrip-track {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      scroll-behavior: smooth;
      padding: 16px 4px;
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    .filmstrip-track::-webkit-scrollbar {
      display: none;
    }

    .filmstrip-thumb {
      flex-shrink: 0;
      width: 160px;
      aspect-ratio: 16 / 9;
      border-radius: 6px;
      border: 2px solid transparent;
      overflow: hidden;
      cursor: pointer;
      scroll-snap-align: center;
      position: relative;
      transition: border-color 0.25s ease, transform 0.25s ease, opacity 0.25s ease;
      opacity: 0.5;
    }

    .filmstrip-thumb::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 4px;
      background: rgba(12, 13, 20, 0.3);
      transition: background 0.25s ease;
      pointer-events: none;
    }

    .filmstrip-thumb:hover {
      opacity: 0.8;
      transform: scale(1.04);
    }

    .filmstrip-thumb:hover::after {
      background: transparent;
    }

    .filmstrip-thumb.is-active {
      border-color: var(--accent-cyan);
      opacity: 1;
      transform: scale(1.06);
    }

    .filmstrip-thumb.is-active::after {
      background: transparent;
    }

    .filmstrip-thumb picture {
      display: block;
      width: 100%;
      height: 100%;
    }

    .filmstrip-thumb-img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 4px;
    }

    .filmstrip-thumb-label {
      position: absolute;
      bottom: 4px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 0.6rem;
      color: var(--text-primary);
      text-shadow: 0 1px 4px rgba(0, 0, 0, 0.9);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.25s ease;
      z-index: 2;
    }

    .filmstrip-thumb:hover .filmstrip-thumb-label,
    .filmstrip-thumb.is-active .filmstrip-thumb-label {
      opacity: 1;
    }

    /* ── Filmstrip edge fades ─────────────────────── */

    .filmstrip-track-wrapper::before,
    .filmstrip-track-wrapper::after {
      content: '';
      position: absolute;
      top: 0;
      bottom: 0;
      width: 40px;
      z-index: 3;
      pointer-events: none;
    }

    .filmstrip-track-wrapper::before {
      left: 0;
      background: linear-gradient(to right, var(--bg-primary), transparent);
    }

    .filmstrip-track-wrapper::after {
      right: 0;
      background: linear-gradient(to left, var(--bg-primary), transparent);
    }

    /* ── Divider ──────────────────────────────────── */

    .divider {
      width: 100%;
      height: 1px;
      background: var(--border);
      opacity: 0.5;
    }

    /* ── CTA + Footer ─────────────────────────────── */

    .cta-footer {
      position: relative;
      padding: 48px 24px 32px;
      text-align: center;
      overflow: hidden;
    }

    .cta-glow {
      position: absolute;
      width: 50%;
      height: 60%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: radial-gradient(
        ellipse,
        rgba(217, 70, 239, 0.08) 0%,
        rgba(6, 182, 212, 0.04) 40%,
        transparent 70%
      );
      filter: blur(50px);
      pointer-events: none;
    }

    .cta-content {
      position: relative;
      z-index: 2;
    }

    .cta-heading {
      font-size: clamp(1.4rem, 3.5vw, 2rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      margin-bottom: 8px;
    }

    .cta-heading .magenta { color: var(--accent-magenta); }
    .cta-heading .cyan { color: var(--accent-cyan); }

    .cta-sub {
      font-size: clamp(0.78rem, 1.5vw, 0.9rem);
      color: var(--text-secondary);
      margin-bottom: 24px;
    }

    .cta-install-box {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 12px 20px;
      border-radius: 10px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      font-size: 0.9rem;
      cursor: pointer;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    .cta-install-box:hover {
      border-color: var(--accent-magenta);
      box-shadow: 0 0 30px rgba(217, 70, 239, 0.1);
    }

    .cta-install-box code {
      color: var(--text-primary);
      font-family: var(--font-mono);
    }

    .cta-install-box .copy-icon {
      width: 15px;
      height: 15px;
      color: var(--text-secondary);
      transition: color 0.2s;
    }

    .cta-install-box:hover .copy-icon {
      color: var(--accent-cyan);
    }

    .cta-links {
      margin-top: 18px;
      display: flex;
      gap: 24px;
      justify-content: center;
    }

    .cta-link {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.8rem;
      transition: color 0.2s;
    }

    .cta-link:hover {
      color: var(--accent-cyan);
    }

    /* ── Fullscreen Overlay ───────────────────────── */

    .fullscreen-overlay {
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(12, 13, 20, 0.96);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .fullscreen-overlay.is-open {
      opacity: 1;
      pointer-events: auto;
    }

    .fullscreen-inner {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    .fullscreen-img {
      max-width: 95vw;
      max-height: 90vh;
      width: auto;
      height: auto;
      border-radius: 8px;
      border: 1px solid var(--border);
      object-fit: contain;
    }

    .fullscreen-close {
      position: absolute;
      top: -44px;
      right: 0;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text-secondary);
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.2s, color 0.2s;
    }

    .fullscreen-close:hover {
      border-color: var(--accent-magenta);
      color: var(--text-primary);
    }

    .fullscreen-title {
      font-size: 0.85rem;
      color: var(--text-secondary);
    }

    /* ── Responsive ───────────────────────────────── */

    @media (max-width: 1024px) {
      .spotlight-img {
        max-width: 90vw;
      }

      .spotlight-stage {
        max-width: 90vw;
      }

      .spotlight-arrow-left {
        left: 8px;
      }

      .spotlight-arrow-right {
        right: 8px;
      }

      .spotlight-arrow {
        width: 38px;
        height: 38px;
        background: rgba(19, 20, 29, 0.95);
      }
    }

    @media (max-width: 768px) {
      .header {
        padding: 8px 16px;
      }

      .header-logo {
        width: 32px;
        height: 32px;
        border-radius: 6px;
      }

      .header-brand {
        font-size: 0.95rem;
      }

      .header-install {
        display: none;
      }

      .main {
        padding-top: 50px;
      }

      .spotlight {
        padding: 20px 16px 14px;
      }

      .spotlight-img {
        max-width: 95vw;
        max-height: 50vh;
      }

      .spotlight-stage {
        max-width: 95vw;
      }

      .spotlight-arrow {
        display: none;
      }

      .spotlight-glow {
        width: 90%;
        filter: blur(35px);
      }

      .spotlight-info {
        margin-top: 16px;
      }

      .filmstrip-section {
        padding: 0 12px 16px;
      }

      .filmstrip-thumb {
        width: 130px;
      }

      .filmstrip-track {
        gap: 8px;
        padding: 12px 4px;
      }

      .fullscreen-img {
        max-width: 98vw;
        max-height: 88vh;
      }

      .cta-footer {
        padding: 32px 16px 24px;
      }
    }

    @media (max-width: 480px) {
      .spotlight-title {
        font-size: 1.15rem;
      }

      .spotlight-desc {
        font-size: 0.75rem;
      }

      .tool-pill {
        font-size: 0.65rem;
        padding: 3px 8px;
      }

      .filmstrip-thumb {
        width: 110px;
      }

      .cta-heading {
        font-size: 1.2rem;
      }

      .cta-install-box {
        padding: 10px 16px;
        font-size: 0.8rem;
      }
    }

    /* ── Custom Scrollbar (body) ──────────────────── */

    body::-webkit-scrollbar {
      width: 6px;
    }

    body::-webkit-scrollbar-track {
      background: var(--bg-primary);
    }

    body::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    body {
      scrollbar-width: thin;
      scrollbar-color: var(--border) var(--bg-primary);
    }
  </style>
</head>
<body>

  <!-- Fixed Header -->
  <header class="header">
    <div class="header-left">
      <img src="../images/logo.png" alt="summon" class="header-logo" width="40" height="40">
      <span class="header-brand">summon</span>
      <span class="header-tagline">workspace layouts for Ghostty</span>
    </div>
    <button class="header-install" onclick="copyInstall(this)" title="Click to copy">
      <svg class="header-install-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
      <span>npm i -g summon-ws</span>
    </button>
  </header>

  <!-- Main Content -->
  <div class="main">

    <!-- Spotlight -->
    <section class="spotlight" id="spotlight">
      <div class="spotlight-glow" id="spotlightGlow"></div>

      <div class="spotlight-stage">
        <button class="spotlight-arrow spotlight-arrow-left" id="arrowLeft" aria-label="Previous layout" onclick="navigate(-1)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
        </button>

        <div class="spotlight-image-container" id="spotlightImageContainer" onclick="openFullscreen()">
          <picture id="spotlightPicture">
            <source id="spotlightSource" srcset="../images/fullstack-max.webp" type="image/webp">
            <img class="spotlight-img glow-shadow-magenta" id="spotlightImg" src="../images/fullstack-max.png" alt="fullstack workspace layout" width="1920" height="1080">
          </picture>
        </div>

        <button class="spotlight-arrow spotlight-arrow-right" id="arrowRight" aria-label="Next layout" onclick="navigate(1)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
        </button>
      </div>

      <div class="spotlight-info" id="spotlightInfo">
        <div class="spotlight-title-row">
          <h2 class="spotlight-title color-magenta" id="spotlightTitle">fullstack</h2>
          <div class="spotlight-mode-toggle">
            <button class="mode-btn" id="modeMinimal" onclick="setMode('minimal')">Minimal</button>
            <button class="mode-btn is-active" id="modeFull" onclick="setMode('full')">Full</button>
          </div>
        </div>
        <p class="spotlight-desc" id="spotlightDesc">Full-stack development with editor, shell, and git in one view.</p>
        <div class="spotlight-tools" id="spotlightTools">
          <span class="tool-pill">Claude</span>
          <span class="tool-pill">lazygit</span>
          <span class="tool-pill">btop</span>
          <span class="tool-pill">shell</span>
        </div>
        <div class="spotlight-counter">
          <span class="current" id="counterCurrent">1</span> / <span id="counterTotal">10</span>
        </div>
      </div>
    </section>

    <!-- Divider -->
    <div class="divider"></div>

    <!-- Filmstrip -->
    <section class="filmstrip-section">
      <div class="filmstrip-track-wrapper">
        <div class="filmstrip-track" id="filmstrip">
          <!-- Thumbnails generated by JS -->
        </div>
      </div>
    </section>

    <!-- Divider -->
    <div class="divider"></div>

    <!-- CTA + Footer -->
    <footer class="cta-footer">
      <div class="cta-glow"></div>
      <div class="cta-content">
        <h2 class="cta-heading"><span class="magenta">summon</span> your <span class="cyan">workspace</span></h2>
        <p class="cta-sub">One command. Every pane, every tool, every time.</p>
        <div class="cta-install-box" onclick="copyInstall(this)" title="Click to copy">
          <code>npm i -g summon-ws</code>
          <svg class="copy-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
        </div>
        <div class="cta-links">
          <a href="https://github.com/juan294/summon" class="cta-link" target="_blank" rel="noopener">GitHub</a>
          <a href="https://www.npmjs.com/package/summon-ws" class="cta-link" target="_blank" rel="noopener">npm</a>
        </div>
      </div>
    </footer>

  </div>

  <!-- Fullscreen Overlay -->
  <div class="fullscreen-overlay" id="fullscreenOverlay" onclick="closeFullscreenBackdrop(event)">
    <div class="fullscreen-inner">
      <button class="fullscreen-close" onclick="closeFullscreen()" aria-label="Close">&times;</button>
      <img class="fullscreen-img" id="fullscreenImg" src="" alt="">
      <span class="fullscreen-title" id="fullscreenTitle"></span>
    </div>
  </div>

  <script>
    // ── Layout Data ──────────────────────────────────
    var layouts = [
      {
        id: 'fullstack',
        title: 'fullstack',
        desc: 'Full-stack development with editor, shell, and git in one view.',
        tools: ['Claude', 'lazygit', 'btop', 'shell'],
        accent: 'magenta'
      },
      {
        id: 'backend',
        title: 'backend',
        desc: 'Server and API development with code review and monitoring.',
        tools: ['Claude', 'lazygit', 'btop', 'docs'],
        accent: 'cyan'
      },
      {
        id: 'devops',
        title: 'devops',
        desc: 'Infrastructure, containers, and deployment with live monitoring.',
        tools: ['Vim', 'Docker', 'btop', 'logs'],
        accent: 'magenta'
      },
      {
        id: 'data',
        title: 'data',
        desc: 'Data science workspace with file browsing, REPL, and visualization.',
        tools: ['Claude', 'Python', 'yazi', 'btop'],
        accent: 'cyan'
      },
      {
        id: 'systems',
        title: 'systems',
        desc: 'Systems programming with performance metrics and deep monitoring.',
        tools: ['Editor', 'btop', 'lazygit', 'metrics'],
        accent: 'magenta'
      },
      {
        id: 'frontend',
        title: 'frontend',
        desc: 'Web UI development with test runner and live build output.',
        tools: ['Claude', 'npm', 'lazygit', 'btop'],
        accent: 'cyan'
      },
      {
        id: 'network',
        title: 'network',
        desc: 'Network monitoring with bandwidth charts and traffic analysis.',
        tools: ['bandwhich', 'btop', 'tcpdump', 'logs'],
        accent: 'magenta'
      },
      {
        id: 'ml',
        title: 'ml',
        desc: 'Machine learning with training visualization and resource monitoring.',
        tools: ['Claude', 'training logs', 'btop', 'lazygit'],
        accent: 'cyan'
      },
      {
        id: 'flex',
        title: 'flex',
        desc: 'Creative multi-tool workspace -- because your terminal can be fun too.',
        tools: ['cmatrix', 'btop', 'neofetch', 'Claude'],
        accent: 'magenta'
      },
      {
        id: 'dual-editor',
        title: 'dual-editor',
        desc: 'Side-by-side editors for pair programming or code review.',
        tools: ['Claude', 'Helix', 'btop', 'lazygit'],
        accent: 'cyan'
      }
    ];

    // ── State ────────────────────────────────────────
    var currentIndex = 0;
    var currentMode = 'full'; // 'full' or 'minimal'
    var isTransitioning = false;

    // ── DOM Elements ─────────────────────────────────
    var spotlightImg = document.getElementById('spotlightImg');
    var spotlightSource = document.getElementById('spotlightSource');
    var spotlightTitle = document.getElementById('spotlightTitle');
    var spotlightDesc = document.getElementById('spotlightDesc');
    var spotlightTools = document.getElementById('spotlightTools');
    var spotlightGlow = document.getElementById('spotlightGlow');
    var modeMinBtn = document.getElementById('modeMinimal');
    var modeFullBtn = document.getElementById('modeFull');
    var counterCurrent = document.getElementById('counterCurrent');
    var filmstrip = document.getElementById('filmstrip');
    var fullscreenOverlay = document.getElementById('fullscreenOverlay');
    var fullscreenImg = document.getElementById('fullscreenImg');
    var fullscreenTitle = document.getElementById('fullscreenTitle');

    // ── Build Filmstrip ──────────────────────────────
    function buildFilmstrip() {
      var html = '';
      for (var i = 0; i < layouts.length; i++) {
        var layout = layouts[i];
        var activeClass = i === 0 ? ' is-active' : '';
        html += '<div class="filmstrip-thumb' + activeClass + '" data-index="' + i + '" onclick="goTo(' + i + ')" title="' + layout.title + '">' +
          '<picture>' +
            '<source srcset="../images/' + layout.id + '-max.webp" type="image/webp">' +
            '<img class="filmstrip-thumb-img" src="../images/' + layout.id + '-max.png" alt="' + layout.title + '" loading="lazy" width="320" height="180">' +
          '</picture>' +
          '<span class="filmstrip-thumb-label">' + layout.title + '</span>' +
        '</div>';
      }
      filmstrip.innerHTML = html;
    }

    buildFilmstrip();

    // ── Update Spotlight ─────────────────────────────
    function updateSpotlight(index, animate) {
      if (isTransitioning) return;

      var layout = layouts[index];
      var suffix = currentMode === 'minimal' ? '-min' : '-max';
      var glowClass = layout.accent === 'magenta' ? 'glow-magenta' : 'glow-cyan';
      var shadowClass = layout.accent === 'magenta' ? 'glow-shadow-magenta' : 'glow-shadow-cyan';
      var colorClass = layout.accent === 'magenta' ? 'color-magenta' : 'color-cyan';

      if (animate) {
        isTransitioning = true;
        spotlightImg.classList.add('is-fading');

        setTimeout(function() {
          applySpotlightData(layout, suffix, glowClass, shadowClass, colorClass, index);
          spotlightImg.classList.remove('is-fading');
          isTransitioning = false;
        }, 300);
      } else {
        applySpotlightData(layout, suffix, glowClass, shadowClass, colorClass, index);
      }

      // Update filmstrip active state
      var thumbs = filmstrip.querySelectorAll('.filmstrip-thumb');
      for (var i = 0; i < thumbs.length; i++) {
        if (i === index) {
          thumbs[i].classList.add('is-active');
        } else {
          thumbs[i].classList.remove('is-active');
        }
      }

      // Scroll filmstrip to center active thumb
      scrollFilmstripToIndex(index);

      // Update counter
      counterCurrent.textContent = (index + 1).toString();
    }

    function applySpotlightData(layout, suffix, glowClass, shadowClass, colorClass, index) {
      spotlightSource.srcset = '../images/' + layout.id + suffix + '.webp';
      spotlightImg.src = '../images/' + layout.id + suffix + '.png';
      spotlightImg.alt = layout.title + ' workspace layout';

      // Update glow
      spotlightGlow.className = 'spotlight-glow ' + glowClass + ' is-visible';

      // Update shadow
      spotlightImg.classList.remove('glow-shadow-magenta', 'glow-shadow-cyan');
      spotlightImg.classList.add(shadowClass);

      // Update title
      spotlightTitle.textContent = layout.title;
      spotlightTitle.className = 'spotlight-title ' + colorClass;

      // Update description
      spotlightDesc.textContent = layout.desc;

      // Update tools
      var pillsHtml = '';
      for (var j = 0; j < layout.tools.length; j++) {
        pillsHtml += '<span class="tool-pill">' + layout.tools[j] + '</span>';
      }
      spotlightTools.innerHTML = pillsHtml;
    }

    // ── Scroll filmstrip to center ───────────────────
    function scrollFilmstripToIndex(index) {
      var thumbs = filmstrip.querySelectorAll('.filmstrip-thumb');
      if (!thumbs[index]) return;
      var thumb = thumbs[index];
      var trackRect = filmstrip.getBoundingClientRect();
      var thumbRect = thumb.getBoundingClientRect();
      var scrollLeft = filmstrip.scrollLeft;
      var centerOffset = (thumbRect.left - trackRect.left) + scrollLeft - (trackRect.width / 2) + (thumbRect.width / 2);
      filmstrip.scrollTo({ left: centerOffset, behavior: 'smooth' });
    }

    // ── Navigation ───────────────────────────────────
    function navigate(direction) {
      var newIndex = currentIndex + direction;
      if (newIndex < 0) newIndex = layouts.length - 1;
      if (newIndex >= layouts.length) newIndex = 0;
      currentIndex = newIndex;
      updateSpotlight(currentIndex, true);
    }

    function goTo(index) {
      if (index === currentIndex) return;
      currentIndex = index;
      updateSpotlight(currentIndex, true);
    }

    // ── Mode Toggle (Minimal / Full) ─────────────────
    function setMode(mode) {
      if (mode === currentMode) return;
      currentMode = mode;

      if (mode === 'minimal') {
        modeMinBtn.classList.add('is-active');
        modeFullBtn.classList.remove('is-active');
      } else {
        modeMinBtn.classList.remove('is-active');
        modeFullBtn.classList.add('is-active');
      }

      // Re-render spotlight with new mode (with crossfade)
      isTransitioning = true;
      spotlightImg.classList.add('is-fading');

      setTimeout(function() {
        var layout = layouts[currentIndex];
        var suffix = currentMode === 'minimal' ? '-min' : '-max';
        spotlightSource.srcset = '../images/' + layout.id + suffix + '.webp';
        spotlightImg.src = '../images/' + layout.id + suffix + '.png';
        spotlightImg.classList.remove('is-fading');
        isTransitioning = false;
      }, 300);
    }

    // ── Fullscreen ───────────────────────────────────
    function openFullscreen() {
      var layout = layouts[currentIndex];
      var suffix = currentMode === 'minimal' ? '-min' : '-max';
      fullscreenImg.src = '../images/' + layout.id + suffix + '.png';
      fullscreenImg.alt = layout.title + ' workspace layout';
      fullscreenTitle.textContent = layout.title + ' (' + currentMode + ')';
      fullscreenOverlay.classList.add('is-open');
      document.body.style.overflow = 'hidden';
    }

    function closeFullscreen() {
      fullscreenOverlay.classList.remove('is-open');
      document.body.style.overflow = '';
    }

    function closeFullscreenBackdrop(e) {
      if (e.target === fullscreenOverlay) {
        closeFullscreen();
      }
    }

    // ── Keyboard Navigation ──────────────────────────
    document.addEventListener('keydown', function(e) {
      // ESC closes fullscreen
      if (e.key === 'Escape') {
        if (fullscreenOverlay.classList.contains('is-open')) {
          closeFullscreen();
          return;
        }
      }

      // Ignore if fullscreen is open
      if (fullscreenOverlay.classList.contains('is-open')) return;

      // Left/right arrows navigate layouts
      if (e.key === 'ArrowLeft') {
        e.preventDefault();
        navigate(-1);
      } else if (e.key === 'ArrowRight') {
        e.preventDefault();
        navigate(1);
      }

      // M toggles mode
      if (e.key === 'm' || e.key === 'M') {
        setMode(currentMode === 'full' ? 'minimal' : 'full');
      }

      // F opens fullscreen
      if (e.key === 'f' || e.key === 'F') {
        openFullscreen();
      }
    });

    // ── Copy Install ─────────────────────────────────
    function copyInstall(el) {
      navigator.clipboard.writeText('npm i -g summon-ws').then(function() {
        var original = el.querySelector('span, code');
        if (original) {
          var text = original.textContent;
          original.textContent = 'copied!';
          setTimeout(function() { original.textContent = text; }, 1500);
        }
      });
    }

    // ── Preload adjacent images ──────────────────────
    function preloadAdjacent(index) {
      var prev = index === 0 ? layouts.length - 1 : index - 1;
      var next = index === layouts.length - 1 ? 0 : index + 1;
      var suffix = currentMode === 'minimal' ? '-min' : '-max';
      [prev, next].forEach(function(i) {
        var img = new Image();
        img.src = '../images/' + layouts[i].id + suffix + '.png';
      });
    }

    // Preload on load
    preloadAdjacent(0);

    // Preload on navigation
    var origNavigate = navigate;
    navigate = function(direction) {
      origNavigate(direction);
      preloadAdjacent(currentIndex);
    };

    var origGoTo = goTo;
    goTo = function(index) {
      origGoTo(index);
      preloadAdjacent(currentIndex);
    };

    // ── Init glow ────────────────────────────────────
    spotlightGlow.classList.add('glow-magenta', 'is-visible');

    // ── Touch/swipe support ──────────────────────────
    (function() {
      var startX = 0;
      var startY = 0;
      var stage = document.querySelector('.spotlight-stage');

      stage.addEventListener('touchstart', function(e) {
        startX = e.touches[0].clientX;
        startY = e.touches[0].clientY;
      }, { passive: true });

      stage.addEventListener('touchend', function(e) {
        var endX = e.changedTouches[0].clientX;
        var endY = e.changedTouches[0].clientY;
        var dx = endX - startX;
        var dy = endY - startY;

        // Only trigger if horizontal swipe is dominant and significant
        if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy) * 1.5) {
          if (dx < 0) {
            navigate(1);
          } else {
            navigate(-1);
          }
        }
      }, { passive: true });
    })();
  </script>
</body>
</html>
