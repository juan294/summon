name: CodeQL

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: github/codeql-action/init@dd56e3a12e424ea7a6c7e6f6ac73b0a6571b8d57 # v4.3.2
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/analyze@dd56e3a12e424ea7a6c7e6f6ac73b0a6571b8d57 # v4.3.2
