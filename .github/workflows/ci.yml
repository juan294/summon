name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      matrix:
        # Vite 8 supports Node 20.19+ and 22.12+. Node 24 added for forward-compat.
        node-version: [20, 22, 24]
        os: [macos-latest]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
      - run: corepack enable
      - run: corepack prepare pnpm@10.29.2 --activate
      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "dir=$(pnpm store path)" >> $GITHUB_OUTPUT
      - uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache.outputs.dir }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build

  e2e-applescript:
    name: AppleScript syntax E2E (macOS)
    runs-on: macos-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
      - run: corepack enable
      - run: corepack prepare pnpm@10.29.2 --activate
      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "dir=$(pnpm store path)" >> $GITHUB_OUTPUT
      - uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache.outputs.dir }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-
      - run: pnpm install --frozen-lockfile
      - name: Attempt Ghostty install (QA-S1 / #517)
        # Best-effort: cask may be unavailable or slow in CI. If it fails, E2E skips gracefully.
        id: ghostty-install
        continue-on-error: true
        run: brew install --cask ghostty
      - name: Run AppleScript syntax E2E tests
        # SUMMON_E2E=1 opts into CI mode.
        # GHOSTTY_AVAILABLE=1 is set only when the brew install step above succeeded,
        # which bypasses the ghosttyInstalled filesystem check in the test — allowing
        # real osacompile validation when Ghostty is present. Without it the test skips.
        run: pnpm vitest run src/e2e/applescript-syntax.test.ts
        env:
          SUMMON_E2E: "1"
          GHOSTTY_AVAILABLE: ${{ steps.ghostty-install.outcome == 'success' && '1' || '' }}
