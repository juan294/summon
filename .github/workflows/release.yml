name: Publish to npm

on:
  release:
    types: [published]

permissions:
  contents: write # Required for gh release upload (SBOM attachment)
  id-token: write # Required for OIDC trusted publishing

jobs:
  publish:
    # Create 'npm-publish' environment in GitHub Settings > Environments with required reviewer
    environment: npm-publish
    concurrency:
      group: npm-publish
      cancel-in-progress: false
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Verify version matches tag
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: package.json version ($PKG_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi
          if ! grep -q "## \[$PKG_VERSION\]" CHANGELOG.md; then
            echo "ERROR: CHANGELOG.md missing entry for version $PKG_VERSION"
            exit 1
          fi

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22' # LTS — update in lockstep with ci.yml matrix
          registry-url: https://registry.npmjs.org
      - run: corepack enable
      - run: corepack prepare pnpm@10.29.2 --activate
      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "dir=$(pnpm store path)" >> $GITHUB_OUTPUT
      - uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache.outputs.dir }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-
      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build

      - name: Generate SBOM (#566, #623)
        # Transient via npx — not a project dependency. Produces CycloneDX JSON SBOM.
        # --ignore-npm-errors: this repo is pnpm-managed, so the tool's internal
        # `npm ls` reports unmet npm-style devDeps; without this flag it exits 254
        # and aborts the job before publish. SBOM is supplementary, never a gate.
        continue-on-error: true
        run: npx --yes @cyclonedx/cyclonedx-npm --ignore-npm-errors --output-file sbom.json

      - name: Attach SBOM to GitHub Release
        # Best-effort: only attach if the SBOM was actually produced; never block publish.
        if: hashFiles('sbom.json') != ''
        continue-on-error: true
        run: gh release upload "$GITHUB_REF_NAME" sbom.json --clobber
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Pack and inspect tarball
        run: |
          npm pack
          TARBALL=$(ls summon-ws-*.tgz)
          echo "Tarball: $TARBALL"
          FILE_COUNT=$(tar tzf "$TARBALL" | grep -E "package/dist/(index\.js|chunk-)" | wc -l | tr -d ' ')
          echo "Matched dist files: $FILE_COUNT"
          if [ "$FILE_COUNT" -lt 2 ]; then
            echo "ERROR: Expected package/dist/index.js + at least one chunk-*.js in tarball (got $FILE_COUNT)" && exit 1
          fi
          if ! tar tzf "$TARBALL" | grep -q "^package/README\.md$"; then
            echo "ERROR: README.md missing from tarball" && exit 1
          fi
          if ! tar tzf "$TARBALL" | grep -q "^package/LICENSE$"; then
            echo "ERROR: LICENSE missing from tarball" && exit 1
          fi
          # Node 22 smoke (pre-publish, using local tarball)
          npm install -g "$TARBALL"
          summon --version
          summon --help

      - name: Upload tarball artifact for multi-node smoke test
        uses: actions/upload-artifact@v7
        with:
          name: summon-tarball
          path: summon-ws-*.tgz
          retention-days: 1

      - name: AppleScript E2E smoke test
        # Validates generated AppleScript syntax via osacompile (no Ghostty needed)
        run: SUMMON_E2E=1 pnpm test:e2e

      - name: Check if version already published
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          if npm view summon-ws@$PKG_VERSION version 2>/dev/null | grep -q "$PKG_VERSION"; then
            echo "Version $PKG_VERSION already published, skipping"
            echo "ALREADY_PUBLISHED=true" >> $GITHUB_ENV
          fi

      - name: Publish
        if: env.ALREADY_PUBLISHED != 'true'
        run: npm publish summon-ws-*.tgz --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        # OIDC trusted publisher on npmjs.com (juan294/summon + release.yml) provides
        # provenance attestation; NPM_TOKEN still required for registry PUT auth.

  # Validate the published tarball on Node 20.19 (minimum) and 24 (latest).
  # Node 22 is already smoke-tested inside the publish job above.
  # Runs after publish so the matrix doesn't gate the release itself.
  smoke-matrix:
    needs: publish
    runs-on: macos-latest
    strategy:
      matrix:
        node-version: ['20.19.0', '24']
    steps:
      - name: Download tarball artifact
        uses: actions/download-artifact@v8
        with:
          name: summon-tarball

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}

      - name: Global install smoke test (Node ${{ matrix.node-version }})
        run: |
          TARBALL=$(ls summon-ws-*.tgz)
          npm install -g "$TARBALL"
          summon --version
          summon --help
